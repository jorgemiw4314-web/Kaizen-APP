<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="J.D Ventas">
<meta name="mobile-web-app-capable" content="yes">
<title>J.D Ventas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: linear-gradient(180deg, #0a0e1a 0%, #0f1729 100%);
    color: #e4e7eb;
    min-height: 100vh;
    padding-bottom: 240px;
    overflow-x: hidden;
  }
  input, button, select, textarea { font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: #10b981 !important; }
  button { cursor: pointer; transition: transform 0.1s; }
  button:active { transform: scale(0.97); }
  .mono { font-family: 'JetBrains Mono', monospace; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .card { animation: slideUp 0.3s ease-out; }
  .fade-in { animation: fadeIn 0.3s ease-out; }

  /* Header */
  .header {
    padding: 24px 20px 16px;
    background: linear-gradient(135deg, rgba(16,185,129,0.08) 0%, rgba(6,182,212,0.04) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .logo {
    width: 42px; height: 42px; border-radius: 12px;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: white;
  }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .header p { font-size: 12px; color: #94a3b8; }

  /* Selector mes */
  .meses-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; margin-right: -20px; padding-right: 20px; }
  .meses-scroll::-webkit-scrollbar { display: none; }
  .mes-btn {
    padding: 8px 14px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
    color: #94a3b8; font-size: 13px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }
  .mes-btn.activo { background: rgba(16,185,129,0.2); border-color: #10b981; color: #10b981; }

  /* Resumen */
  .resumen { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .resumen-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; padding: 12px 14px;
  }
  .resumen-card.destacado { background: linear-gradient(135deg, rgba(16,185,129,0.13), rgba(16,185,129,0.03)); border-color: rgba(16,185,129,0.25); }
  .resumen-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .resumen-value { font-size: 17px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: #e4e7eb; }
  .resumen-sub { font-size: 10px; color: #64748b; margin-top: 2px; }

  /* Secciones */
  .secciones { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .seccion {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px; overflow: hidden;
  }
  .seccion-header { padding: 16px; }
  .seccion-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .chevron-btn { background: transparent; border: none; color: #94a3b8; padding: 0; display: flex; }
  .seccion-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .seccion-info { flex: 1; }
  .seccion-info h2 { font-size: 17px; font-weight: 700; }
  .seccion-info p { font-size: 12px; color: #94a3b8; }
  .seccion-ganancia { text-align: right; }
  .seccion-ganancia .label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
  .seccion-ganancia .value { font-size: 16px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }

  .precio-real-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; background: rgba(0,0,0,0.25); border-radius: 10px;
  }
  .precio-real-row .label { font-size: 12px; color: #94a3b8; font-weight: 600; }
  .precio-real-row button { background: transparent; border: none; color: #e4e7eb; display: flex; align-items: center; gap: 6px; }
  .precio-real-row .monto { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .precio-input {
    width: 100px; padding: 6px 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; color: #e4e7eb;
    font-size: 14px; font-family: 'JetBrains Mono', monospace;
    text-align: right;
  }
  .save-btn { width: 28px; height: 28px; border-radius: 6px; border: none; display: flex; align-items: center; justify-content: center; color: white; }

  .seccion-body { padding: 12px; }
  .vacio { text-align: center; padding: 20px; color: #64748b; font-size: 13px; }

  /* Cliente row */
  .cliente {
    display: flex; align-items: center; gap: 10px; padding: 12px;
    background: rgba(255,255,255,0.02); border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.04);
    margin-bottom: 8px;
    transition: all 0.2s;
  }
  .check-btn { background: transparent; border: none; padding: 0; flex-shrink: 0; font-size: 24px; }
  .cliente-info { flex: 1; min-width: 0; }
  .cliente-info .nombre { font-size: 14px; font-weight: 600; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cliente-tags { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
  .tag-mensual { background: rgba(6,182,212,0.15); color: #06b6d4; }
  .tag-unico { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .cliente-notas { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cliente-pago { text-align: right; flex-shrink: 0; }
  .cliente-pago .monto { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #f1f5f9; }
  .cliente-acciones { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .icon-btn { width: 28px; height: 28px; border-radius: 6px; border: none; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .icon-btn.edit { background: rgba(255,255,255,0.04); color: #94a3b8; }
  .icon-btn.delete { background: rgba(239,68,68,0.08); color: #ef4444; }

  .add-cliente-btn {
    width: 100%; padding: 16px;
    border-radius: 10px;
    font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    position: relative; z-index: 10;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: flex; align-items: flex-end;
    backdrop-filter: blur(8px);
  }
  .modal {
    background: #0f1729; width: 100%;
    border-radius: 24px 24px 0 0; padding: 24px 20px;
    max-height: 90vh; overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.08);
    animation: slideUp 0.3s ease-out;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .modal-header h3 { font-size: 20px; font-weight: 700; }
  .modal-subtitle { font-size: 13px; font-weight: 600; margin-bottom: 20px; }
  .close-btn {
    background: rgba(255,255,255,0.05); border: none;
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #94a3b8; font-size: 18px;
  }
  .campo { margin-bottom: 16px; }
  .campo-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .campo-label label { font-size: 13px; font-weight: 600; color: #cbd5e1; }
  .campo-label .hint { font-size: 11px; color: #64748b; }
  .required { color: #10b981; }
  .input {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; color: #e4e7eb;
    font-size: 15px;
  }
  .tipo-pago-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tipo-btn {
    padding: 12px; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    color: #94a3b8; font-weight: 600; font-size: 14px;
  }
  .tipo-btn.activo { background: rgba(16,185,129,0.15); border-color: #10b981; color: #10b981; }
  .guardar-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-size: 16px; font-weight: 700; color: white;
    margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, #10b981, #059669);
  }
  .guardar-btn:disabled { background: rgba(255,255,255,0.05); cursor: not-allowed; }

  /* Bottom Nav */
  .nav-bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 12px 20px 20px;
    display: flex; gap: 8px; z-index: 50;
  }
  .nav-btn {
    flex: 1; padding: 10px; background: transparent;
    border: none; border-radius: 12px; color: #64748b;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
  }
  .nav-btn.activo { background: rgba(16,185,129,0.15); color: #10b981; }
  .nav-btn .icon { font-size: 20px; }

  /* Dashboard */
  .dashboard-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 16px;
    margin-bottom: 16px;
  }
  .dashboard-title { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 15px; font-weight: 700; }

  /* Charts */
  .chart-container { width: 100%; }
  .chart-svg { width: 100%; display: block; }

  .servicio-bar { margin-bottom: 12px; }
  .servicio-bar-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
  .servicio-bar-row .nombre { color: #cbd5e1; font-weight: 600; }
  .servicio-bar-row .monto { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .servicio-bar-bg { height: 8px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
  .servicio-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease-out; }

  /* Botón ir a hoy */
  .ir-hoy-btn {
    margin-top: 8px;
    padding: 6px 12px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 8px;
    color: #10b981;
    font-size: 12px;
    font-weight: 600;
  }
  .mes-btn.es-hoy { font-weight: 700; }

  /* Modal de confirmación */
  .confirmar-box {
    background: #0f1729;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px 20px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    animation: slideUp 0.25s ease-out;
  }
  .confirmar-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }
  .confirmar-titulo {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #f1f5f9;
  }
  .confirmar-mensaje {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .confirmar-botones {
    display: flex;
    gap: 8px;
  }
  .btn-cancelar, .btn-confirmar {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
  }
  .btn-cancelar {
    background: rgba(255,255,255,0.05);
    color: #cbd5e1;
  }
  .btn-confirmar {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
  }

  /* Botones de respaldo */
  .backup-btn {
    flex: 1;
    padding: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
  }
  .backup-btn:hover {
    background: rgba(255,255,255,0.06);
  }

  /* Tamaño mínimo de fuente para evitar zoom automático en iOS */
  input.input, input.precio-input, textarea.input {
    font-size: 16px;
  }

  /* Alertas de vencimiento */
  .alertas-container {
    margin: 0 16px 16px;
    background: linear-gradient(135deg, rgba(251,146,60,0.08), rgba(251,146,60,0.02));
    border: 1px solid rgba(251,146,60,0.2);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .alertas-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .alertas-icon { font-size: 16px; }
  .alertas-titulo {
    font-size: 13px; font-weight: 700; color: #fb923c;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .alerta-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; margin-bottom: 6px;
    background: rgba(0,0,0,0.2); border-radius: 10px;
    border-left: 3px solid;
    transition: transform 0.1s;
  }
  .alerta-row:active { transform: scale(0.98); }
  .alerta-row:last-child { margin-bottom: 0; }
  .alerta-vencido { border-left-color: #ef4444; }
  .alerta-hoy { border-left-color: #f59e0b; }
  .alerta-pronto { border-left-color: #fb923c; }
  .alerta-info { flex: 1; min-width: 0; }
  .alerta-nombre {
    font-size: 14px; font-weight: 600; color: #f1f5f9;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .alerta-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .alerta-estado {
    font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 8px;
    flex-shrink: 0; margin-left: 10px;
  }
  .alerta-vencido .alerta-estado { background: rgba(239,68,68,0.15); color: #ef4444; }
  .alerta-hoy .alerta-estado { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .alerta-pronto .alerta-estado { background: rgba(251,146,60,0.15); color: #fb923c; }

  /* Badge de vencimiento en cliente row */
  .badge-venc {
    font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
    white-space: nowrap;
  }
  .venc-rojo { background: rgba(239,68,68,0.15); color: #ef4444; }
  .venc-naranja { background: rgba(251,146,60,0.15); color: #fb923c; }
  .venc-ok { background: rgba(100,116,139,0.15); color: #94a3b8; }

  /* Bloque info próximo pago en modal */
  .info-proximo {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 12px;
    padding: 14px;
    margin-top: 8px;
  }

  /* Fix para input type=date en dark mode */
  input[type="date"] {
    color-scheme: dark;
  }

  /* Banners de notificaciones / instalación */
  .banner {
    display: flex; align-items: center; gap: 12px;
    margin: 0 16px 12px;
    padding: 14px;
    border-radius: 14px;
    animation: slideUp 0.3s ease-out;
  }
  .banner-notif {
    background: linear-gradient(135deg, rgba(6,182,212,0.12), rgba(6,182,212,0.03));
    border: 1px solid rgba(6,182,212,0.25);
  }
  .banner-instalar {
    background: linear-gradient(135deg, rgba(167,139,250,0.12), rgba(167,139,250,0.03));
    border: 1px solid rgba(167,139,250,0.25);
  }
  .banner-icon { font-size: 24px; flex-shrink: 0; }
  .banner-texto { flex: 1; min-width: 0; }
  .banner-titulo { font-size: 14px; font-weight: 700; color: #f1f5f9; margin-bottom: 2px; }
  .banner-sub { font-size: 11px; color: #94a3b8; line-height: 1.3; }
  .banner-acciones { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .banner-btn {
    padding: 8px 14px;
    border: none; border-radius: 10px;
    font-size: 12px; font-weight: 700;
    color: white;
  }
  .banner-notif .banner-btn { background: #06b6d4; }
  .banner-instalar .banner-btn { background: #a78bfa; }
  .banner-cerrar {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.05);
    border: none; border-radius: 50%;
    color: #94a3b8; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Estado de notificaciones en ajustes */
  .notif-status {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    font-size: 13px;
  }
  .notif-status.activas { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); }
  .notif-status.denegadas { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============== ESTADO ==============
const SERVICIOS = {
  internet: { nombre: 'Internet', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>', color: '#06b6d4', gradient: 'linear-gradient(135deg, #06b6d4, #0891b2)' },
  netflix: { nombre: 'Netflix', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>', color: '#ef4444', gradient: 'linear-gradient(135deg, #ef4444, #dc2626)' },
  spotify: { nombre: 'Spotify', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>', color: '#10b981', gradient: 'linear-gradient(135deg, #10b981, #059669)' },
  otros: { nombre: 'Otros', icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>', color: '#a78bfa', gradient: 'linear-gradient(135deg, #a78bfa, #8b5cf6)' }
};
const MESES_NOMBRES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

let state = {
  data: {
    internet: { precioReal: 0, clientes: [] },
    netflix: { precioReal: 0, clientes: [] },
    spotify: { precioReal: 0, clientes: [] },
    otros: { precioReal: 0, clientes: [] }
  },
  pagosMes: {},
  vista: 'inicio',
  mesActual: claveMes(new Date()),
  expandido: { internet: true, netflix: true, spotify: true, otros: true },
  editandoPrecio: null,
  precioTemp: '',
  modal: null,
  modalPago: null,
  confirmar: null,
  notifPermiso: 'default', // 'default' | 'granted' | 'denied'
  pwaInstalable: false,
  mostrarBannerInstalar: true,
  mostrarBannerNotif: true,
  formCliente: { nombre: '', pago: '', tipoPago: 'mensual', notas: '', fechaPago: '' }
};

// ============== HELPERS ==============
function claveMes(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function parseMes(k) { const [y,m] = k.split('-'); return { year: +y, month: +m-1 }; }
function formatoMes(k) { const {year, month} = parseMes(k); return `${MESES_NOMBRES[month]} ${year}`; }
function formatoMesCorto(k) { const {year, month} = parseMes(k); return `${MESES_NOMBRES[month]} ${String(year).slice(2)}`; }
function fmt(n) { return '$' + (n||0).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtCorto(n) { if (Math.abs(n) >= 1000) return '$' + (n/1000).toFixed(1) + 'k'; return '$' + Math.round(n); }
function estaPagado(sk, cid) { return state.pagosMes[state.mesActual]?.[sk+':'+cid] === true; }
function esc(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============== FECHAS ==============
function hoyISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function sumarMes(fechaISO) {
  // Suma 1 mes exacto. Si el día no existe (ej. 31 ene + 1 mes), usa el último día del mes destino.
  if (!fechaISO) return null;
  const [y, m, d] = fechaISO.split('-').map(Number);
  const dest = new Date(y, m - 1 + 1, d);
  // Si JS desbordó (ej. 31 ene -> 3 mar), ajustar al último día del mes destino
  if (dest.getMonth() !== m % 12) {
    dest.setDate(0); // último día del mes anterior (el correcto)
  }
  return `${dest.getFullYear()}-${String(dest.getMonth()+1).padStart(2,'0')}-${String(dest.getDate()).padStart(2,'0')}`;
}
function diasEntre(fechaISO) {
  // Días desde hoy hasta fechaISO. Negativo = ya pasó.
  if (!fechaISO) return null;
  const [y, m, d] = fechaISO.split('-').map(Number);
  const destino = new Date(y, m-1, d);
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  destino.setHours(0,0,0,0);
  return Math.round((destino - hoy) / (1000*60*60*24));
}
function formatoFecha(fechaISO) {
  if (!fechaISO) return '—';
  const [y, m, d] = fechaISO.split('-').map(Number);
  return `${d} ${MESES_NOMBRES[m-1]}`;
}
function estadoVencimiento(fechaISO) {
  // Devuelve: 'vencido', 'hoy', 'pronto', 'ok' o null
  const dias = diasEntre(fechaISO);
  if (dias === null) return null;
  if (dias < 0) return 'vencido';
  if (dias === 0) return 'hoy';
  if (dias <= 3) return 'pronto';
  return 'ok';
}

// ============== NOTIFICACIONES ==============
let deferredInstallPrompt = null;

function inicializarNotificaciones() {
  // Estado actual de permisos
  if ('Notification' in window) {
    state.notifPermiso = Notification.permission;
  }

  // Capturar evento de instalación (Android/Chrome)
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    state.pwaInstalable = true;
    render();
  });

  // Detectar cuando la app fue instalada
  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    state.pwaInstalable = false;
    localStorage.setItem('pwa-instalada', '1');
    render();
  });

  // Restaurar preferencias de banners
  if (localStorage.getItem('banner-instalar-cerrado') === '1') state.mostrarBannerInstalar = false;
  if (localStorage.getItem('banner-notif-cerrado') === '1') state.mostrarBannerNotif = false;
}

async function pedirPermisoNotificaciones() {
  if (!('Notification' in window)) {
    alert('Tu navegador no soporta notificaciones.');
    return;
  }
  try {
    const permiso = await Notification.requestPermission();
    state.notifPermiso = permiso;
    if (permiso === 'granted') {
      // Notificación de prueba
      mostrarNotificacion('🎉 ¡Notificaciones activadas!', 'Te avisaremos cuando una membresía esté por vencer.');
      // Programar la revisión periódica
      programarRevisionPeriodica();
    }
    render();
  } catch(e) {
    console.error('Error pidiendo permiso:', e);
  }
}

function mostrarNotificacion(titulo, cuerpo, opciones = {}) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    // Intentar con Service Worker primero (más confiable, especialmente para apps cerradas)
    if (navigator.serviceWorker?.controller) {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification(titulo, {
          body: cuerpo,
          icon: ICON_DATA_URL,
          badge: ICON_DATA_URL,
          tag: opciones.tag || 'jd-ventas',
          renotify: true,
          requireInteraction: opciones.requireInteraction || false,
          data: opciones.data || {}
        });
      }).catch(e => console.error('SW notif error:', e));
    } else {
      // Fallback: notificación directa
      new Notification(titulo, { body: cuerpo, icon: ICON_DATA_URL });
    }
  } catch(e) {
    console.error('Error mostrando notificación:', e);
  }
}

function revisarYNotificar() {
  if (Notification.permission !== 'granted') return;
  const alertas = obtenerAlertas();
  if (alertas.length === 0) return;

  // Evitar duplicados: solo notificar una vez al día por cliente
  const hoy = hoyISO();
  const ultimasNotifs = JSON.parse(localStorage.getItem('ultimas-notifs') || '{}');
  const nuevos = alertas.filter(a => ultimasNotifs[a.id] !== hoy);

  if (nuevos.length === 0) return;

  // Agrupar mensajes
  if (nuevos.length === 1) {
    const a = nuevos[0];
    const servicio = SERVICIOS[a.servicio].nombre;
    let titulo, cuerpo;
    if (a.tipo === 'vencido') {
      titulo = `⚠ ${a.nombre} - Membresía vencida`;
      cuerpo = `${servicio} venció hace ${Math.abs(diasEntre(a.proximoPago))} día(s). Avísale para que renueve.`;
    } else if (a.tipo === 'hoy') {
      titulo = `🔔 ${a.nombre} - Vence hoy`;
      cuerpo = `${servicio} vence hoy. ¡Recuérdale renovar!`;
    } else {
      titulo = `⏰ ${a.nombre} - Próximo vencimiento`;
      cuerpo = `${servicio} vence en ${diasEntre(a.proximoPago)} día(s). Avísale para preparar el pago.`;
    }
    mostrarNotificacion(titulo, cuerpo, { tag: 'cliente-' + a.id, requireInteraction: true });
  } else {
    const vencidos = nuevos.filter(a => a.tipo === 'vencido').length;
    const pronto = nuevos.length - vencidos;
    let cuerpo = '';
    if (vencidos > 0) cuerpo += `${vencidos} ya venció(eron). `;
    if (pronto > 0) cuerpo += `${pronto} vence(n) pronto.`;
    mostrarNotificacion(`🔔 ${nuevos.length} membresías requieren atención`, cuerpo.trim(), { tag: 'resumen-diario', requireInteraction: true });
  }

  // Marcar como notificadas hoy
  nuevos.forEach(a => { ultimasNotifs[a.id] = hoy; });
  localStorage.setItem('ultimas-notifs', JSON.stringify(ultimasNotifs));
}

function programarRevisionPeriodica() {
  // Revisar cada hora mientras la app esté abierta
  if (window.__revisorInterval) clearInterval(window.__revisorInterval);
  window.__revisorInterval = setInterval(revisarYNotificar, 60 * 60 * 1000);

  // Service Worker hace la revisión en segundo plano
  if (navigator.serviceWorker?.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'programar-revision' });
  }
}

async function instalarPWA() {
  if (!deferredInstallPrompt) {
    alert('Para instalar la app:\n\n• Android: toca el menú ⋮ del navegador → "Instalar app" o "Agregar a pantalla de inicio"\n\n• iPhone: toca el botón compartir ⎋ → "Agregar a pantalla de inicio"');
    return;
  }
  deferredInstallPrompt.prompt();
  const { outcome } = await deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') {
    deferredInstallPrompt = null;
    state.pwaInstalable = false;
    render();
  }
}

function cerrarBannerInstalar() {
  state.mostrarBannerInstalar = false;
  localStorage.setItem('banner-instalar-cerrado', '1');
  render();
}

function cerrarBannerNotif() {
  state.mostrarBannerNotif = false;
  localStorage.setItem('banner-notif-cerrado', '1');
  render();
}

// Icono SVG embebido como data URL para las notificaciones (badge)
const ICON_DATA_URL = 'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#10b981"/><text x="96" y="135" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="white">$</text></svg>`);

// ============== PERSISTENCIA (localStorage) ==============
function guardarLocal() {
  try {
    localStorage.setItem('pagos-data', JSON.stringify(state.data));
    localStorage.setItem('pagos-mes', JSON.stringify(state.pagosMes));
  } catch(e) { console.error(e); }
}
function cargarLocal() {
  try {
    const d = localStorage.getItem('pagos-data');
    const p = localStorage.getItem('pagos-mes');
    if (d) {
      const guardado = JSON.parse(d);
      // Merge por servicio: conserva claves nuevas del código aunque no estén en localStorage
      Object.keys(state.data).forEach(sk => {
        if (guardado[sk]) {
          // Asegurar que cada cliente tenga los campos nuevos (migración)
          const clientes = Array.isArray(guardado[sk].clientes) ? guardado[sk].clientes : [];
          clientes.forEach(c => {
            if (c.fechaPago === undefined) c.fechaPago = null;
            if (c.proximoPago === undefined) c.proximoPago = c.fechaPago ? sumarMes(c.fechaPago) : null;
          });
          state.data[sk] = {
            precioReal: guardado[sk].precioReal || 0,
            clientes: clientes
          };
        }
      });
    }
    if (p) state.pagosMes = JSON.parse(p) || {};
  } catch(e) { console.error('Error cargando datos:', e); }
}

// ============== ACCIONES ==============
function setVista(v) { state.vista = v; render(); }
function setMes(m) { state.mesActual = m; render(); }
function toggleExpandido(k) { state.expandido[k] = !state.expandido[k]; render(); }

function iniciarEditarPrecio(k) {
  state.editandoPrecio = k;
  state.precioTemp = String(state.data[k].precioReal || '');
  render();
  requestAnimationFrame(() => {
    const inp = document.getElementById('precio-input');
    if (inp) { inp.focus(); inp.select(); }
  });
}
function guardarPrecio(k) {
  state.data[k].precioReal = parseFloat(state.precioTemp) || 0;
  state.editandoPrecio = null;
  state.precioTemp = '';
  guardarLocal();
  render();
}

function togglePago(sk, cid) {
  const yaPagado = estaPagado(sk, cid);
  if (yaPagado) {
    // Desmarcar: directo sin modal
    if (!state.pagosMes[state.mesActual]) state.pagosMes[state.mesActual] = {};
    state.pagosMes[state.mesActual][sk+':'+cid] = false;
    guardarLocal();
    render();
  } else {
    // Marcar como pagado: abrir modal de fecha
    state.modalPago = { servicio: sk, clienteId: cid, fecha: hoyISO() };
    render();
  }
}

function confirmarPago() {
  if (!state.modalPago) return;
  const { servicio, clienteId, fecha } = state.modalPago;
  // Marcar como pagado en el mes
  if (!state.pagosMes[state.mesActual]) state.pagosMes[state.mesActual] = {};
  state.pagosMes[state.mesActual][servicio+':'+clienteId] = true;
  // Actualizar fecha del cliente
  const cliente = state.data[servicio].clientes.find(c => c.id === clienteId);
  if (cliente) {
    cliente.fechaPago = fecha;
    cliente.proximoPago = sumarMes(fecha);
  }
  state.modalPago = null;
  guardarLocal();
  render();
}

function cancelarModalPago() {
  state.modalPago = null;
  render();
}

function actualizarFechaPago(valor) {
  if (state.modalPago) state.modalPago.fecha = valor;
}

function abrirModal(servicio, clienteId) {
  const cliente = clienteId ? state.data[servicio].clientes.find(c => c.id === clienteId) : null;
  state.formCliente = {
    nombre: cliente?.nombre || '',
    pago: cliente?.pago ? String(cliente.pago) : '',
    tipoPago: cliente?.tipoPago || 'mensual',
    notas: cliente?.notas || '',
    fechaPago: cliente?.fechaPago || ''
  };
  state.modal = { servicio, clienteId };
  render();
}
function cerrarModal() {
  state.modal = null;
  state.formCliente = { nombre: '', pago: '', tipoPago: 'mensual', notas: '', fechaPago: '' };
  render();
}
function actualizarForm(campo, valor) {
  state.formCliente[campo] = valor;
  // Re-render para tipoPago (cambia visual) y fechaPago (muestra próximo pago calculado)
  if (campo === 'tipoPago' || campo === 'fechaPago') render();
}

function guardarCliente() {
  if (!state.formCliente.nombre.trim()) return;
  const { servicio, clienteId } = state.modal;
  const existente = clienteId ? state.data[servicio].clientes.find(c => c.id === clienteId) : null;
  const fechaPago = state.formCliente.fechaPago || null;
  const nuevo = {
    id: clienteId || ('c_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)),
    nombre: state.formCliente.nombre.trim(),
    pago: parseFloat(state.formCliente.pago) || 0,
    tipoPago: state.formCliente.tipoPago,
    notas: state.formCliente.notas.trim(),
    fechaPago: fechaPago,
    proximoPago: fechaPago ? sumarMes(fechaPago) : null,
    creado: existente?.creado || Date.now()
  };
  if (clienteId && existente) {
    state.data[servicio].clientes = state.data[servicio].clientes.map(c => c.id === clienteId ? nuevo : c);
  } else {
    state.data[servicio].clientes.push(nuevo);
  }
  guardarLocal();
  cerrarModal();
}

function eliminarCliente(servicio, id) {
  const cliente = state.data[servicio].clientes.find(c => c.id === id);
  if (!cliente) return;
  state.confirmar = {
    titulo: 'Eliminar cliente',
    mensaje: `¿Seguro que quieres eliminar a "${cliente.nombre}"? Esta acción no se puede deshacer.`,
    onConfirm: () => {
      state.data[servicio].clientes = state.data[servicio].clientes.filter(c => c.id !== id);
      // Limpiar pagos asociados en todos los meses
      Object.keys(state.pagosMes).forEach(mk => {
        delete state.pagosMes[mk][servicio+':'+id];
      });
      guardarLocal();
      state.confirmar = null;
      render();
    }
  };
  render();
}

function exportarDatos() {
  try {
    const datos = {
      version: 1,
      exportado: new Date().toISOString(),
      data: state.data,
      pagosMes: state.pagosMes
    };
    const blob = new Blob([JSON.stringify(datos, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `jd-ventas-backup-${claveMes(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    console.error('Error exportando:', e);
    alert('No se pudo exportar el archivo.');
  }
}

function importarDatos(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const datos = JSON.parse(e.target.result);
      if (!datos.data || typeof datos.data !== 'object') throw new Error('Formato inválido');
      state.confirmar = {
        titulo: 'Importar datos',
        mensaje: 'Esto reemplazará TODOS tus datos actuales. ¿Continuar?',
        onConfirm: () => {
          Object.keys(state.data).forEach(sk => {
            if (datos.data[sk]) {
              state.data[sk] = {
                precioReal: datos.data[sk].precioReal || 0,
                clientes: Array.isArray(datos.data[sk].clientes) ? datos.data[sk].clientes : []
              };
            }
          });
          state.pagosMes = datos.pagosMes || {};
          guardarLocal();
          state.confirmar = null;
          render();
        }
      };
      render();
    } catch(err) {
      console.error('Error importando:', err);
      alert('Archivo inválido. Asegúrate de usar un backup de J.D Ventas.');
    }
  };
  reader.readAsText(file);
}

// ============== ALERTAS DE VENCIMIENTO ==============
function obtenerAlertas() {
  const alertas = [];
  Object.entries(state.data).forEach(([sk, s]) => {
    s.clientes.forEach(c => {
      if (c.tipoPago !== 'mensual' || !c.proximoPago) return;
      const estado = estadoVencimiento(c.proximoPago);
      const dias = diasEntre(c.proximoPago);
      // Solo alertar si NO está marcado como pagado este mes y el vencimiento es relevante
      const yaPago = estaPagado(sk, c.id);
      if (estado === 'vencido' && !yaPago) {
        alertas.push({ servicio: sk, id: c.id, nombre: c.nombre, proximoPago: c.proximoPago, tipo: 'vencido', texto: `Venció hace ${Math.abs(dias)}d`, orden: dias });
      } else if (estado === 'hoy' && !yaPago) {
        alertas.push({ servicio: sk, id: c.id, nombre: c.nombre, proximoPago: c.proximoPago, tipo: 'hoy', texto: 'Hoy', orden: 0 });
      } else if (estado === 'pronto' && !yaPago) {
        alertas.push({ servicio: sk, id: c.id, nombre: c.nombre, proximoPago: c.proximoPago, tipo: 'pronto', texto: `En ${dias}d`, orden: dias });
      }
    });
  });
  // Ordenar: más urgentes primero (vencidos arriba)
  return alertas.sort((a, b) => a.orden - b.orden);
}

// ============== CÁLCULOS ==============
function calcularTotalesMes() {
  let cobrado = 0, costoReal = 0, mensual = 0;
  Object.entries(state.data).forEach(([sk, s]) => {
    let huboPagos = false;
    s.clientes.forEach(c => {
      if (c.tipoPago === 'mensual') mensual += c.pago;
      if (estaPagado(sk, c.id)) { cobrado += c.pago; huboPagos = true; }
    });
    if (huboPagos) costoReal += s.precioReal;
  });
  return { cobrado, costoReal, ganancia: cobrado - costoReal, mensualEsperado: mensual };
}

function calcularDatosMensuales() {
  const hoy = new Date();
  const meses = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
    const key = claveMes(d);
    const pagos = state.pagosMes[key] || {};
    let cobrado = 0, costo = 0;
    Object.entries(state.data).forEach(([sk, s]) => {
      let hubo = false;
      s.clientes.forEach(c => {
        if (pagos[sk+':'+c.id]) { cobrado += c.pago; hubo = true; }
      });
      if (hubo) costo += s.precioReal;
    });
    meses.push({
      mes: formatoMesCorto(key),
      cobrado: Math.round(cobrado*100)/100,
      costo: Math.round(costo*100)/100,
      ganancia: Math.round((cobrado-costo)*100)/100
    });
  }
  return meses;
}

// ============== RENDER ==============
function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + (state.vista === 'inicio' ? renderInicio() : renderDashboard()) + renderNav() + renderModal() + renderModalPago() + renderConfirmar();
  bindEvents();
}

function renderHeader() {
  return `
    <div class="header">
      <div class="header-top">
        <div class="logo">$</div>
        <div style="flex:1">
          <h1>J.D Ventas</h1>
          <p>${state.vista === 'inicio' ? 'Control por servicio' : 'Ganancias mes a mes'}</p>
        </div>
      </div>
      ${state.vista === 'inicio' ? renderSelectorMes() : ''}
    </div>
  `;
}

function renderSelectorMes() {
  const hoy = new Date();
  const hoyKey = claveMes(hoy);
  let html = '<div class="meses-scroll">';
  for (let i = -6; i <= 2; i++) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()+i, 1);
    const k = claveMes(d);
    const esHoy = k === hoyKey;
    html += `<button class="mes-btn ${k===state.mesActual?'activo':''} ${esHoy?'es-hoy':''}" data-action="setMes" data-mes="${k}">${formatoMes(k)}${esHoy ? ' •' : ''}</button>`;
  }
  html += '</div>';
  // Botón "ir a hoy" si no estamos en el mes actual
  if (state.mesActual !== hoyKey) {
    html += `<button class="ir-hoy-btn" data-action="irHoy">↻ Ir a hoy</button>`;
  }
  return html;
}

  }

  // Banner para instalar como app
  const yaInstalada = (typeof window.matchMedia === 'function' && window.matchMedia('(display-mode: standalone)').matches) || localStorage.getItem('pwa-instalada') === '1';
  if (state.mostrarBannerInstalar && !yaInstalada) {
    html += `<div class="banner banner-instalar">
      <div class="banner-icon">📱</div>
      <div class="banner-texto">

  html += `

  const pagados = s.clientes.filter(c => estaPagado(key, c.id)).length;
  const editando = state.editandoPrecio === key;
  const expandido = state.expandido[key];

  let html = `<div class="seccion">
    <div class="seccion-header" style="background: linear-gradient(135deg, ${info.color}15, ${info.color}05); ${expandido ? `border-bottom: 1px solid ${info.color}20;` : ''}">

        <span class="chevron-btn" style="font-size:14px">${expandido ? '▼' : '▶'}</span>

function renderClienteRow(servicioKey, c, color) {

  const estado = estadoVencimiento(c.proximoPago);
  const dias = diasEntre(c.proximoPago);

  if (c.proximoPago && c.tipoPago === 'mensual') {
    if (estado === 'vencido') {
      badgeVenc = `<span class="badge-venc venc-rojo">⚠ Venció hace ${Math.abs(dias)} día${Math.abs(dias)!==1?'s':''}</span>`;
    } else if (estado === 'hoy') {
      badgeVenc = `<span class="badge-venc venc-naranja">🔔 Vence hoy</span>`;
    } else if (estado === 'pronto') {
      badgeVenc = `<span class="badge-venc venc-naranja">⏰ Vence en ${dias} día${dias!==1?'s':''}</span>`;
    } else if (estado === 'ok') {
      badgeVenc = `<span class="badge-venc venc-ok">📅 ${formatoFecha(c.proximoPago)}</span>`;

function renderLineChart(datos) {
  const W = 320, H = 200, padL = 40, padR = 10, padT = 10, padB = 30;
  const cw = W - padL - padR, ch = H - padT - padB;
  const valores = datos.map(d => d.ganancia);
  let minV = Math.min(...valores, 0);
  let maxV = Math.max(...valores, 0);
  if (minV === maxV) { maxV = minV + 100; }
  const rango = maxV - minV;
  const xStep = cw / (datos.length - 1 || 1);

  const px = i => padL + i * xStep;
  const py = v => padT + ch - ((v - minV) / rango) * ch;

  // Líneas grid
  let grid = '';
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    const val = maxV - (rango / 4) * i;
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3 3"/>`;
    grid += `<text x="${padL-4}" y="${y+3}" fill="#64748b" font-size="9" text-anchor="end" font-family="JetBrains Mono">${fmtCorto(val)}</text>`;
  }

  // Línea cero
  if (minV < 0 && maxV > 0) {
    const y0 = py(0);
    grid += `<line x1="${padL}" y1="${y0}" x2="${W-padR}" y2="${y0}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>`;
  }

  // Path
  const pathD = datos.map((d, i) => `${i === 0 ? 'M' : 'L'} ${px(i)} ${py(d.ganancia)}`).join(' ');

  // Área debajo
  const areaD = pathD + ` L ${px(datos.length-1)} ${padT+ch} L ${px(0)} ${padT+ch} Z`;

  // Puntos y labels X
  let puntos = '', labelsX = '';
  datos.forEach((d, i) => {
    puntos += `<circle cx="${px(i)}" cy="${py(d.ganancia)}" r="3.5" fill="#10b981" stroke="#0a0e1a" stroke-width="2"/>`;
    if (i % 2 === 0 || i === datos.length - 1) {
      labelsX += `<text x="${px(i)}" y="${H-12}" fill="#64748b" font-size="9" text-anchor="middle">${d.mes}</text>`;
    }
  });

  return `<div class="chart-container">
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${grid}
      <path d="${areaD}" fill="url(#areaGrad)"/>
      <path d="${pathD}" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${puntos}
      ${labelsX}
    </svg>
  </div>`;
}

function renderBarChart(datos) {
  const W = 320, H = 200, padL = 40, padR = 10, padT = 10, padB = 30;
  const cw = W - padL - padR, ch = H - padT - padB;
  const maxV = Math.max(...datos.flatMap(d => [d.cobrado, d.costo]), 1);
  const groupW = cw / datos.length;
  const barW = groupW * 0.35;
  const gap = groupW * 0.05;

  let grid = '';
  for (let i = 0; i <= 4; i++) {
    const y = padT + (ch / 4) * i;
    const val = maxV - (maxV / 4) * i;
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-dasharray="3 3"/>`;
    grid += `<text x="${padL-4}" y="${y+3}" fill="#64748b" font-size="9" text-anchor="end" font-family="JetBrains Mono">${fmtCorto(val)}</text>`;
  }

  let bars = '', labelsX = '';
  datos.forEach((d, i) => {
    const gx = padL + i * groupW + groupW * 0.1;
    const hCob = (d.cobrado / maxV) * ch;
    const hCos = (d.costo / maxV) * ch;
    bars += `<rect x="${gx}" y="${padT+ch-hCob}" width="${barW}" height="${hCob}" fill="#06b6d4" rx="3"/>`;
    bars += `<rect x="${gx+barW+gap}" y="${padT+ch-hCos}" width="${barW}" height="${hCos}" fill="#64748b" rx="3"/>`;
    labelsX += `<text x="${padL + i*groupW + groupW/2}" y="${H-12}" fill="#64748b" font-size="9" text-anchor="middle">${d.mes}</text>`;
  });

  return `<div class="chart-container">
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${grid}
      ${bars}
      ${labelsX}
    </svg>
    <div style="display:flex; gap:16px; justify-content:center; margin-top:8px; font-size:11px">
      <span style="display:flex; align-items:center; gap:4px"><span style="width:10px; height:10px; background:#06b6d4; border-radius:2px; display:inline-block"></span> Cobrado</span>
      <span style="display:flex; align-items:center; gap:4px"><span style="width:10px; height:10px; background:#64748b; border-radius:2px; display:inline-block"></span> Costo</span>
    </div>
  </div>`;
}

  const c = state.confirmar;
  return `<div class="modal-overlay" data-action="cancelarConfirmar" style="align-items:center; padding: 20px">
    <div class="confirmar-box" onclick="event.stopPropagation()">
      <div class="confirmar-icon">⚠️</div>
      <h3 class="confirmar-titulo">${esc(c.titulo)}</h3>
      <p class="confirmar-mensaje">${esc(c.mensaje)}</p>
      <div class="confirmar-botones">
        <button class="btn-cancelar" data-action="cancelarConfirmar">Cancelar</button>
        <button class="btn-confirmar" data-action="aceptarConfirmar">Eliminar</button>
      </div>
    </div>
  </div>`;
}

// ============== EVENTOS ==============
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', handleClick);
  });
  const pi = document.getElementById('precio-input');
  if (pi) {
    pi.addEventListener('input', e => { state.precioTemp = e.target.value; });
    pi.addEventListener('keydown', e => {
      if (e.key === 'Enter') guardarPrecio(state.editandoPrecio);
    });
  }
}

function handleClick(e) {
  const action = e.currentTarget.dataset.action;
  const d = e.currentTarget.dataset;
  switch(action) {
    case 'setVista': setVista(d.vista); break;
    case 'setMes': setMes(d.mes); break;
    case 'toggleExp': toggleExpandido(d.key); break;
    case 'iniciarPrecio': iniciarEditarPrecio(d.key); break;
    case 'guardarPrecio': guardarPrecio(d.key); break;
    case 'togglePago': togglePago(d.servicio, d.cid); break;
    case 'abrirModal': abrirModal(d.servicio, d.cid); break;
    case 'cerrarModal':
      // Cierra si se clickea el overlay o el botón X (no si se clickea contenido del modal)
      if (e.currentTarget.classList.contains('modal-overlay')) {
        if (e.target === e.currentTarget) cerrarModal();
      } else {
        cerrarModal();
      }
      break;
    case 'setTipoPago': actualizarForm('tipoPago', d.tipo); break;
    case 'guardarCliente': guardarCliente(); break;
    case 'eliminarCliente':
      e.stopPropagation();
      eliminarCliente(d.servicio, d.cid);
      break;
    case 'cancelarConfirmar':
      // Cierra si se clickea el overlay o el botón cancelar
      if (e.currentTarget.classList.contains('modal-overlay')) {
        if (e.target === e.currentTarget) {
          state.confirmar = null;
          render();
        }
      } else {
        state.confirmar = null;
        render();
      }
      break;
    case 'aceptarConfirmar':
      if (state.confirmar?.onConfirm) state.confirmar.onConfirm();
      break;
    case 'cancelarModalPago':
      // Cerrar si overlay o botón X
      if (e.currentTarget.classList.contains('modal-overlay')) {
        if (e.target === e.currentTarget) cancelarModalPago();
      } else {
        cancelarModalPago();
      }
      break;
    case 'confirmarPago':
      confirmarPago();
      break;
    case 'pedirNotif':
      pedirPermisoNotificaciones();
      break;
    case 'cerrarBannerNotif':
      cerrarBannerNotif();
      break;
    case 'cerrarBannerInstalar':
      cerrarBannerInstalar();
      break;
    case 'instalar':
      instalarPWA();
      break;
    case 'irHoy':
      state.mesActual = claveMes(new Date());
      render();
      break;
    case 'exportar':
      exportarDatos();
      break;
    case 'importar':
      document.getElementById('archivo-importar')?.click();
      break;
  }
}

// ============== INIT ==============
cargarLocal();
inicializarNotificaciones();
render();

// Registrar Service Worker para notificaciones en segundo plano
if ('serviceWorker' in navigator) {
  const swCode = `
    const REVISION_INTERVAL = 6 * 60 * 60 * 1000; // 6 horas
    let revisionTimer = null;

    self.addEventListener('install', (e) => {
      self.skipWaiting();
    });

    self.addEventListener('activate', (e) => {
      e.waitUntil(clients.claim());
      programarRevision();
    });

    self.addEventListener('message', (e) => {
      if (e.data?.type === 'programar-revision') programarRevision();
    });

    self.addEventListener('notificationclick', (e) => {
      e.notification.close();
      e.waitUntil(
        clients.matchAll({ type: 'window' }).then(clientList => {
          for (const c of clientList) {
            if ('focus' in c) return c.focus();
          }
          if (clients.openWindow) return clients.openWindow('/');
        })
      );
    });

    function programarRevision() {
      if (revisionTimer) clearTimeout(revisionTimer);
      revisionTimer = setTimeout(revisarVencimientos, REVISION_INTERVAL);
    }

    async function revisarVencimientos() {
      // El SW no tiene acceso directo a localStorage, así que pide datos al cliente
      const clientList = await clients.matchAll({ type: 'window', includeUncontrolled: true });
      if (clientList.length > 0) {
        // Si hay ventana abierta, ella misma revisa
        programarRevision();
        return;
      }
      // Sin ventana: intentar usar Background Sync si está disponible
      programarRevision();
    }

    // Periodic Background Sync (Chrome Android, requiere permiso especial)
    self.addEventListener('periodicsync', (e) => {
      if (e.tag === 'revisar-vencimientos') {
        e.waitUntil(revisarVencimientos());
      }
    });
  `;

  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);

  navigator.serviceWorker.register(swUrl, { scope: './' }).then(reg => {
    console.log('Service Worker registrado');
    // Intentar registrar periodic sync si el navegador lo soporta
    if ('periodicSync' in reg) {
      navigator.permissions.query({ name: 'periodic-background-sync' }).then(status => {
        if (status.state === 'granted') {
          reg.periodicSync.register('revisar-vencimientos', {
            minInterval: 6 * 60 * 60 * 1000 // 6 horas
          }).catch(e => console.log('Periodic sync no disponible:', e.message));
        }
      }).catch(() => {});
    }
  }).catch(e => console.log('SW no registrado:', e.message));
}

// Cuando la app gana el foco, revisar vencimientos
window.addEventListener('focus', () => {
  if (state.notifPermiso === 'granted') {
    setTimeout(revisarYNotificar, 1000);
  }
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.notifPermiso === 'granted') {
    setTimeout(revisarYNotificar, 1000);
  }
});

// Revisar al iniciar si las notificaciones están activadas
if (state.notifPermiso === 'granted') {
  setTimeout(() => {
    revisarYNotificar();
    programarRevisionPeriodica();
  }, 2000);
}

// Tecla Escape cierra modales
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.confirmar) { state.confirmar = null; render(); }
    else if (state.modalPago) { cancelarModalPago(); }
    else if (state.modal) { cerrarModal(); }
    else if (state.editandoPrecio) { state.editandoPrecio = null; state.precioTemp = ''; render(); }
  }
});

// Exponer funciones que se llaman desde atributos inline (oninput, onchange)
window.actualizarForm = actualizarForm;
window.actualizarFechaPago = actualizarFechaPago;
window.importarDatos = importarDatos;
</script>
